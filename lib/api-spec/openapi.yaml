openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Soundwave Music Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Albums
    description: Album management
  - name: Songs
    description: Song management
  - name: Artists
    description: Artist profiles
  - name: Playlists
    description: User playlist management
  - name: Users
    description: User profile
  - name: Featured
    description: Featured and discovery endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/me:
    get:
      tags: [Users]
      operationId: getMe
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      tags: [Users]
      operationId: updateMe
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /artists:
    get:
      tags: [Artists]
      operationId: listArtists
      summary: List all artists
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Filter by artist name
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of artists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artist"

  /artists/{id}:
    get:
      tags: [Artists]
      operationId: getArtist
      summary: Get artist profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist profile with albums
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistDetail"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /albums:
    get:
      tags: [Albums]
      operationId: listAlbums
      summary: List all albums
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Filter by album or artist name
        - name: artistId
          in: query
          schema:
            type: integer
          description: Filter by artist
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"

    post:
      tags: [Albums]
      operationId: createAlbum
      summary: Upload a new album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumInput"
      responses:
        "201":
          description: Album created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /albums/{id}:
    get:
      tags: [Albums]
      operationId: getAlbum
      summary: Get album details with songs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album with songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumDetail"
        "404":
          description: Album not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    delete:
      tags: [Albums]
      operationId: deleteAlbum
      summary: Delete an album (uploader only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /albums/{id}/songs:
    post:
      tags: [Albums]
      operationId: addSongToAlbum
      summary: Add a song to an album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Song added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Album not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /songs:
    get:
      tags: [Songs]
      operationId: listSongs
      summary: List songs
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Filter by song or artist name
        - name: albumId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"

  /songs/{id}:
    get:
      tags: [Songs]
      operationId: getSong
      summary: Get a song by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    delete:
      tags: [Songs]
      operationId: deleteSong
      summary: Delete a song (uploader only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /playlists:
    get:
      tags: [Playlists]
      operationId: listPlaylists
      summary: List current user's playlists
      responses:
        "200":
          description: User playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playlist"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    post:
      tags: [Playlists]
      operationId: createPlaylist
      summary: Create a new playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "201":
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /playlists/{id}:
    get:
      tags: [Playlists]
      operationId: getPlaylist
      summary: Get playlist with songs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playlist with songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    patch:
      tags: [Playlists]
      operationId: updatePlaylist
      summary: Update playlist name or privacy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistUpdate"
      responses:
        "200":
          description: Updated playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    delete:
      tags: [Playlists]
      operationId: deletePlaylist
      summary: Delete a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /playlists/{id}/songs:
    post:
      tags: [Playlists]
      operationId: addSongToPlaylist
      summary: Add a song to a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistSongInput"
      responses:
        "201":
          description: Song added to playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /playlists/{id}/songs/{songId}:
    delete:
      tags: [Playlists]
      operationId: removeSongFromPlaylist
      summary: Remove a song from a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /featured:
    get:
      tags: [Featured]
      operationId: getFeatured
      summary: Get featured/recent albums for discovery
      responses:
        "200":
          description: Featured data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedData"

  /stats:
    get:
      tags: [Featured]
      operationId: getStats
      summary: Get platform-wide stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    User:
      type: object
      required: [id, clerkId, username, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        displayName:
          type: string

    Artist:
      type: object
      required: [id, name, albumCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        albumCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ArtistDetail:
      type: object
      required: [id, name, albumCount, albums, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        albumCount:
          type: integer
        albums:
          type: array
          items:
            $ref: "#/components/schemas/Album"
        createdAt:
          type: string
          format: date-time

    Album:
      type: object
      required: [id, title, artistId, artistName, uploaderUsername, songCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        artistId:
          type: integer
        artistName:
          type: string
        coverUrl:
          type: ["string", "null"]
        uploaderUsername:
          type: string
        uploaderClerkId:
          type: string
        songCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    AlbumDetail:
      type: object
      required: [id, title, artistId, artistName, uploaderUsername, songs, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        artistId:
          type: integer
        artistName:
          type: string
        coverUrl:
          type: ["string", "null"]
        uploaderUsername:
          type: string
        uploaderClerkId:
          type: string
        songs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        createdAt:
          type: string
          format: date-time

    AlbumInput:
      type: object
      required: [title, artistName, songs]
      properties:
        title:
          type: string
          minLength: 1
        artistName:
          type: string
          minLength: 1
        coverObjectPath:
          type: ["string", "null"]
        songs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SongInput"

    Song:
      type: object
      required: [id, title, albumId, albumTitle, artistId, artistName, uploaderUsername, duration, objectPath, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        albumId:
          type: integer
        albumTitle:
          type: string
        artistId:
          type: integer
        artistName:
          type: string
        coverUrl:
          type: ["string", "null"]
        uploaderUsername:
          type: string
        uploaderClerkId:
          type: string
        duration:
          type: ["integer", "null"]
          description: Duration in seconds
        objectPath:
          type: string
        trackNumber:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    SongInput:
      type: object
      required: [title, objectPath]
      properties:
        title:
          type: string
          minLength: 1
        objectPath:
          type: string
          minLength: 1
        duration:
          type: ["integer", "null"]
        trackNumber:
          type: ["integer", "null"]

    Playlist:
      type: object
      required: [id, name, isPrivate, songCount, ownerUsername, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        isPrivate:
          type: boolean
        songCount:
          type: integer
        ownerUsername:
          type: string
        coverUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PlaylistDetail:
      type: object
      required: [id, name, isPrivate, ownerUsername, songs, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        isPrivate:
          type: boolean
        ownerUsername:
          type: string
        coverUrl:
          type: ["string", "null"]
        songs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        createdAt:
          type: string
          format: date-time

    PlaylistInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        isPrivate:
          type: boolean

    PlaylistUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        isPrivate:
          type: boolean

    PlaylistSongInput:
      type: object
      required: [songId]
      properties:
        songId:
          type: integer

    FeaturedData:
      type: object
      required: [recentAlbums, popularArtists]
      properties:
        recentAlbums:
          type: array
          items:
            $ref: "#/components/schemas/Album"
        popularArtists:
          type: array
          items:
            $ref: "#/components/schemas/Artist"

    PlatformStats:
      type: object
      required: [totalAlbums, totalSongs, totalArtists, totalUsers]
      properties:
        totalAlbums:
          type: integer
        totalSongs:
          type: integer
        totalArtists:
          type: integer
        totalUsers:
          type: integer
